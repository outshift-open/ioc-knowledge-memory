services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=ci-tkf-data-logic-svc
      - APPLICATION_VERSION=dev
      - LOG_LEVEL=INFO
    volumes:
      - ./src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
