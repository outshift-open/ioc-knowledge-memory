services:
  ioc-graph-db:
    image: skaiworldwide/agensgraph:v2.16.0-alpine3.22
    platform: linux/amd64
    profiles:
      - db-only
    environment:
      POSTGRES_DB: ${AGENSGRAPH_DB:-ioc-graph-db}
      POSTGRES_USER: ${AGENSGRAPH_USER}
      POSTGRES_PASSWORD: ${AGENSGRAPH_PASSWORD}
    ports:
      - "${AGENSGRAPH_PORT:-5456}:5432"
    volumes:
      - agensgraph_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U $$POSTGRES_USER -d $$AGENSGRAPH_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ioc-graph-db-viewer:
    image: skaiworldwide/agviewer:latest
    environment:
      DB_HOST: ioc-graph-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${AGENSGRAPH_DB:-ioc-graph-db}
    ports:
      - "${AGENSGRAPH_PORT_UI:-3000}:3000"
    depends_on:
      - ioc-graph-db

  tkf-relational-db:
    image: timescale/timescaledb-ha:pg17
    profiles:
      - db-only
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tkf}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=timescaledb"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescaledb_data:/var/lib/timescaledb/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-tkf} -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tkf-graph-vector-db:
    image: neo4j:5.26-community
    profiles:
      - db-only
    ports:
      - "${NEO4J_PORT_HTTP:-7474}:7474" # HTTP (UI)
      - "${NEO4J_PORT:-7687}:7687" # Bolt (driver)
    environment:
      - NEO4J_initial_dbms_default__database=${NEO4J_DATABASE:-tkf}
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_dbms_connector_http_listen__address=0.0.0.0:${NEO4J_PORT_HTTP:-7474}
      - NEO4J_dbms_connector_bolt_listen__address=0.0.0.0:${NEO4J_PORT:-7687}
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: wget -q -O /dev/null http://localhost:7474 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  ci-tkf-data-logic-svc:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - api
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=ci-tkf-data-logic-svc
      - APPLICATION_VERSION=dev
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - POSTGRES_HOST=tkf-relational-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-tkf}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEO4J_HOST=tkf-graph-vector-db
      - NEO4J_PORT=7687
      - NEO4J_DATABASE=${NEO4J_DATABASE:-tkf}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    restart: unless-stopped
    depends_on:
      tkf-relational-db:
        condition: service_healthy
      tkf-graph-vector-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  timescaledb_data:
  neo4j_data:
  neo4j_logs:
  agensgraph_data:
