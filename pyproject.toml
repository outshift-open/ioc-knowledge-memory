[project]
name = "ci-tkf-data-logic-svc"
version = "0.1.0"
description = "TKF Data Logic Service"
authors = [{name = "Cisco ETI Team"}]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "prometheus-fastapi-instrumentator>=6.1.0",
    "email-validator>=2.1.0",
    "requests",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "black", 
    "flake8",
    "httpx>=0.28.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/server"]