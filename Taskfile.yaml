version: "3"

vars:
  TASK_VERSION: v3.39.2
  TASK_INSTALL_DIR: ./bin
  SRC_DIR: ./src
  PYTHON: python3

tasks:
  deps:
    desc: Install task binary locally in this repository
    cmds:
      - task: install
    silent: false

  install:
    desc: Install Python dependencies using Poetry
    cmds:
      - poetry install

  poetry-update:
    desc: Update Poetry dependencies
    cmds:
      - poetry update

  poetry-lock:
    desc: Generate or update poetry.lock file
    cmds:
      - poetry lock

  dev:
    desc: Start development server with hot reload
    cmds:
      - poetry run uvicorn server.main:app --host 0.0.0.0 --port 8000 --reload
    dir: "{{.SRC_DIR}}"

  run:
    desc: Start production server using main.py
    cmds:
      - poetry run python main.py
    dir: "{{.SRC_DIR}}/server"

  test:
    desc: Run all tests with pytest
    cmds:
      - poetry run pytest tests/ -v

  test-coverage:
    desc: Run tests with coverage report
    cmds:
      - poetry run pytest tests/ --cov=server --cov-report=term-missing

  test-workspaces:
    desc: Run only workspace tests
    cmds:
      - poetry run pytest tests/test_workspaces.py -v

  test-users:
    desc: Run only user tests
    cmds:
      - poetry run pytest tests/test_users.py -v

  test-api-keys:
    desc: Run only API key tests
    cmds:
      - poetry run pytest tests/test_api_keys.py -v

  lint:
    desc: Run linting and formatting
    cmds:
      - poetry run black server/
      - poetry run flake8 server/
    dir: "{{.SRC_DIR}}"

  lint-check:
    desc: Check linting without making changes
    cmds:
      - poetry run black --check server/
      - poetry run flake8 server/
    dir: "{{.SRC_DIR}}"

  clean:
    desc: Clean Python cache files
    cmds:
      - find . -type d -name "__pycache__" -delete
      - find . -name "*.pyc" -delete

  docker-build:
    desc: Build Docker image
    cmds:
      - |
        docker build \
          --build-arg GIT_COMMIT_SHA=$(git rev-parse HEAD) \
          --build-arg GIT_COMMIT_TIME=$(git log -1 --format=%cI) \
          --build-arg GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD) \
          -t ci-tkf-data-logic-svc:latest .

  docker-run:
    desc: Run Docker container
    cmds:
      - docker run -p 8000:8000 ci-tkf-data-logic-svc:latest

  docker-compose-up:
    desc: Start services with docker-compose
    cmds:
      - docker-compose up

  docker-compose-down:
    desc: Stop services with docker-compose
    cmds:
      - docker-compose down

  # Database migration tasks
  db-migrate-apply:
    desc: Apply pending database migrations
    cmds:
      - /usr/local/bin/atlasgo migrate apply --dir "file://migrations" --env local
    dir: "src/server/database/relational_db"

  db-migrate-status:
    desc: Show database migration status
    cmds:
      - /usr/local/bin/atlasgo migrate status --dir "file://migrations" --env local
    dir: "src/server/database/relational_db"

  db-migrate-new:
    desc: Create a new migration which will be placed in migrations folder (provide name as argument)
    # task db-migrate-new -- "msg_for_migration"
    cmds:
      - /usr/local/bin/atlasgo migrate diff {{.CLI_ARGS}} --dir "file://migrations" --env local
    dir: "src/server/database/relational_db"

  db-migrate-hash:
    desc: Rehash migration files to update checksums
    cmds:
      - /usr/local/bin/atlasgo migrate hash --dir "file://migrations"
    dir: "src/server/database/relational_db"


  help:
    desc: Show available tasks
    cmds:
      - task --list
