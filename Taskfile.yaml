version: "3"

dotenv:
  - .env

vars:
  TASK_VERSION: v3.39.2
  TASK_INSTALL_DIR: ./bin
  SRC_DIR: "{{.PWD}}/src"
  PYTHON: python3
  BIN_DIR: "{{.PWD}}/bin"

tasks:
  deps:
    desc: Install all dependencies (Python and Atlas)
    cmds:
      - task: install-atlas
      - task: install-poetry
    silent: false

  install-atlas:
    desc: Install Atlas migration tool to bin directory
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - curl -sSf https://atlasgo.sh | sh -s -- --no-install -o {{.BIN_DIR}}/atlasgo -y
      - chmod +x {{.BIN_DIR}}/atlasgo
    status:
      - '[ -f "{{.BIN_DIR}}/atlasgo" ]'

  install-poetry:
    desc: Install Python dependencies using Poetry
    cmds:
      - poetry install

  poetry-update:
    desc: Update Poetry dependencies
    cmds:
      - poetry update

  poetry-lock:
    desc: Generate or update poetry.lock file
    cmds:
      - poetry lock

  generate-dek:
    desc: Generate Data Encryption Key (DEK) and save to config.json
    cmds:
      - poetry run python scripts/generate_DEK.py

  dev:
    desc: Start development server with hot reload
    cmds:
      - poetry run uvicorn server.main:app --host 0.0.0.0 --port 8001 --reload
    dir: "{{.SRC_DIR}}"

  run:
    desc: Start production server (installs deps, applies db migrations, generates DEK, then runs)
    cmds:
      - task: deps
      - task: db-migrate-apply
      - task: db-seed
      - task: generate-dek
      - poetry run python -m server.main
    dir: "{{.SRC_DIR}}"

  test:
    desc: Run all tests with pytest
    cmds:
      - poetry run pytest tests/ -v

  test-coverage:
    desc: Run tests with coverage report
    cmds:
      - poetry run pytest tests/ --cov=server --cov-report=term-missing

  test-workspaces:
    desc: Run only workspace tests
    cmds:
      - poetry run pytest tests/test_workspaces.py -v

  test-users:
    desc: Run only user tests
    cmds:
      - poetry run pytest tests/test_users.py -v

  test-api-keys:
    desc: Run only API key tests
    cmds:
      - poetry run pytest tests/test_api_keys.py -v

  test-tkf:
    desc: Run only tkf GraphDB related tests
    cmds:
      - poetry run pytest src/server/schemas/test_tkf.py -v
      - poetry run pytest src/server/adapters/test_adapter_graphdb_neo4j.py -v
      - poetry run pytest src/server/database/graph_db/neo4j/models/test_node.py -v
      - poetry run pytest src/server/database/graph_db/neo4j/models/test_edge.py -v
      - poetry run pytest src/server/api/endpoints/test_tkf.py -v

  lint-check:
    desc: Run linting checks
    cmds:
      - ./scripts/lint.sh --check

  lint:
    desc: Fix linting issues automatically
    cmds:
      - ./scripts/lint.sh

  clean:
    desc: Clean Python cache files
    cmds:
      - find . -type d -name "__pycache__" -delete
      - find . -name "*.pyc" -delete

  docker-build:
    desc: Build Docker image
    cmds:
      - |
        docker build \
          --build-arg GIT_COMMIT_SHA=$(git rev-parse HEAD) \
          --build-arg GIT_COMMIT_TIME=$(git log -1 --format=%cI) \
          --build-arg GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD) \
          --no-cache \
          -t ci-tkf-data-logic-svc:latest .

  docker-run:
    desc: Run Docker container
    cmds:
      - docker run -p 8001:8001 ci-tkf-data-logic-svc:latest

  docker-compose-up:
    desc: Start all services with docker-compose
    cmds:
      - docker compose --env-file .env --profile db-only --profile api up --build

  docker-compose-down:
    desc: Stop all services with docker-compose
    cmds:
      - docker compose --env-file .env --profile db-only --profile api down

  docker-compose-db-up:
    desc: Start only databases (PostgreSQL and Neo4j) with db-only profile
    cmds:
      - docker compose --env-file .env --profile db-only up -d

  docker-compose-db-down:
    desc: Stop only databases with db-only profile
    cmds:
      - docker compose --env-file .env --profile db-only down

  docker-compose-db-down-with-volumes:
    desc: Stop databases and remove volumes with db-only profile
    cmds:
      - docker compose --env-file .env --profile db-only down -v

  # Database migration tasks
  db-migrate-apply:
    desc: Apply pending database migrations
    cmds:
      - '{{.BIN_DIR}}/atlasgo migrate apply --dir "file://migrations" --env local'
    dir: "src/server/database/relational_db"

  db-migrate-status:
    desc: Show database migration status
    cmds:
      - /usr/local/bin/atlasgo migrate status --dir "file://migrations" --env local
    dir: "src/server/database/relational_db"

  db-migrate-new:
    desc: Create a new migration which will be placed in migrations folder (provide name as argument)
    # task db-migrate-new -- "msg_for_migration"
    cmds:
      - /usr/local/bin/atlasgo migrate diff {{.CLI_ARGS}} --dir "file://migrations" --env local
    dir: "src/server/database/relational_db"

  db-migrate-hash:
    desc: Rehash migration files to update checksums
    cmds:
      - /usr/local/bin/atlasgo migrate hash --dir "file://migrations"
    dir: "src/server/database/relational_db"

  db-seed:
    desc: Seed the database with initial data
    cmds:
      - poetry run psql postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@localhost:5455/tkf -f scripts/populate_software.sql
    dir: "{{.SRC_DIR}}/server/database/relational_db"

  help:
    desc: Show available tasks
    cmds:
      - task --list
