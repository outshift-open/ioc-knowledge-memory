version: "3"

dotenv:
  - .env

vars:
  TASK_VERSION: v3.39.2
  TASK_INSTALL_DIR: ./bin
  SRC_DIR: "{{.PWD}}/src"
  PYTHON: python3
  BIN_DIR: "{{.PWD}}/bin"

tasks:
  deps:
    desc: Install all dependencies
    cmds:
      - task: install-poetry
    silent: false

  install-poetry:
    desc: Install Python dependencies using Poetry
    cmds:
      - poetry install

  poetry-update:
    desc: Update Poetry dependencies
    cmds:
      - poetry update

  poetry-lock:
    desc: Generate or update poetry.lock file
    cmds:
      - poetry lock

  dev:
    desc: Start development server with hot reload
    cmds:
      - poetry run uvicorn server.main:app --host 0.0.0.0 --port 9003 --reload
    dir: "{{.SRC_DIR}}"

  run:
    desc: Start production server (installs deps, then runs)
    cmds:
      - task: deps
      - poetry run python -m server.main
    dir: "{{.SRC_DIR}}"

  test:
    desc: Run all tests under src folder recursively
    cmds:
      - poetry run pytest src/ -v

  test-coverage:
    desc: Run tests with coverage report
    cmds:
      - poetry run pytest src/ --cov=server --cov-report=term-missing

  lint-check:
    desc: Run linting checks
    cmds:
      - ./scripts/lint.sh --check

  lint:
    desc: Fix linting issues automatically
    cmds:
      - ./scripts/lint.sh

  clean:
    desc: Clean Python cache files
    cmds:
      - find . -type d -name "__pycache__" -delete
      - find . -name "*.pyc" -delete

  docker-build:
    desc: Build Docker image
    cmds:
      - |
        docker build \
          --build-arg GIT_COMMIT_SHA=$(git rev-parse HEAD) \
          --build-arg GIT_COMMIT_TIME=$(git log -1 --format=%cI) \
          --build-arg GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD) \
          --no-cache \
          -t ioc-knowledge-memory-svc:latest .

  docker-run:
    desc: Run Docker container
    cmds:
      - docker run -p 9003:9003 ioc-knowledge-memory-svc:latest

  docker-compose-up:
    desc: Start all services with docker-compose
    cmds:
      - docker compose --env-file .env up --build

  docker-compose-down:
    desc: Stop all services with docker-compose
    cmds:
      - docker compose --env-file .env down

  docker-compose-down-with-volumes:
    desc: Stop and remove volumes
    cmds:
      - docker compose --env-file .env down -v

  help:
    desc: Show available tasks
    cmds:
      - task --list
