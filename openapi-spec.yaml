    KnowledgeVectorQueryCriteria:
      type: object
      properties:
        query_type:
          type: string
          enum:
            - list_by_wksp_id
            - list_by_mas_id
            - get_by_id
            - distance_l2
            - distance_cosine
          description: Type of query to execute
          example: "distance_l2"
        id:
          type: string
          format: uuid
          description: ID of vector to query (required for get_by_id)
          example: "123e4567-e89b-12d3-a456-426614174001"
        embedding:
          $ref: '#/components/schemas/EmbeddingConfig'
        limit:
          type: integer
          minimum: 1
          description: Limit used by queries
          example: 10
      description: Query criteria for vector search operations

    KnowledgeVectorQueryRequest:
      type: object
      required:
        - wksp_id
        - mas_id
      properties:
        request_id:
          type: string
          format: uuid
          description: Auto-generated UUID for request tracking used if not passed in request
          example: "bbc2fea0-5e6c-4cf9-b7b4-fe6418c041a0"
        wksp_id:
          type: string
          minLength: 1
          description: ID for the Workspace
          example: "9f136aa0-143c-46a6-82f2-249eac489e52"
        mas_id:
          type: string
          minLength: 1
          description: ID for the Multi-Agent System
          example: "223e4567-e89b-12d3-a456-426614174001"
        query_criteria:
          $ref: '#/components/schemas/KnowledgeVectorQueryCriteria'
      description: Request to query the store

    KnowledgeVectorQueryResponseRecord:
      type: object
      required:
        - id
        - content
        - embedding
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
          example: "123e4567-e89b-12d3-a456-426614174001"
        content:
          type: string
          description: Content in plain text
          example: "This is sample content from vector storage"
        embedding:
          $ref: '#/components/schemas/EmbeddingConfig'
        distance:
          type: number
          format: float
          description: Distance between query and record (only included for similarity queries)
          example: 0.85
        created_at:
          type: integer
          description: Timestamp of record creation in epoch time
          example: 1640995200
        updated_at:
          type: integer
          description: Timestamp of record update in epoch time
          example: 1640995200
      description: Individual record in query response

    KnowledgeVectorQueryResponse:
      type: object
      required:
        - status
      properties:
        request_id:
          type: string
          format: uuid
          description: UUID for request tracking
          example: "bbc2fea0-5e6c-4cf9-b7b4-fe6418c041a0"
        status:
          $ref: '#/components/schemas/ResponseStatus'
        message:
          type: string
          description: Optional message providing additional information
          example: "Query executed successfully"
        records:
          type: array
          items:
            $ref: '#/components/schemas/KnowledgeVectorQueryResponseRecord'
          description: Query response records (only included for success status)
      description: Response from the Store after querying knowledge vector data

